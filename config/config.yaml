# Central configuration. Every experiment knob lives here so runs are
# reproducible from config + code alone (no magic constants in notebooks).

universe:
  # "dev"  -> top-N by trailing dollar volume within point-in-time membership
  # "full" -> all point-in-time S&P 500 members
  mode: full
  dev_top_n: 100
  # Change-log trust floor: membership before this date is approximated as
  # "member since floor" for tickers with no observed addition event.
  floor_date: "2010-01-01"

dates:
  start: "2010-01-01"
  end: null            # null = today at download time (recorded in metadata)

data:
  raw_dir: data/raw
  processed_dir: data/processed
  wikipedia_cache: data/raw/wikipedia

# Populated in later phases:
labels:
  horizon_days: 20     # monthly, non-overlapping rebalance

costs:
  per_side_bps: 10     # base case; sensitivity run at [5, 10, 20]

portfolio:
  # Fraction of the universe held long. Was hardcoded 0.20 everywhere (not
  # actually in this file, despite the header above) until top_q_holdout.py
  # found 0.20 was itself an in-sample pick from sensitivity.py's full-sample
  # sweep -- selecting on pre-2020 data only and testing on the untouched
  # 2020-2026 holdout both prefer 0.15 (holdout Sharpe 0.531 vs 0.478).
  # Currently wired into build_backtest.py only -- the ~14 other scripts that
  # hardcode top_q=0.20 (factor regression, sector exposure, bootstrap CIs,
  # all 5 market-timing overlay holdouts, the LightGBM-vs-Ridge comparison)
  # are each a specific historical study already published in the README and
  # have NOT been rerun at 0.15. Don't assume their numbers hold at this
  # value without rerunning them.
  top_q: 0.15
